<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Stickman Supreme Duelist Showdown 4P</title>
    <style>
      body {
        margin: 0;
        background: #1e1e24;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        color: white;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        overflow: hidden;
      }
      #hud {
        display: flex;
        justify-content: space-between;
        width: 800px;
        margin-bottom: 10px;
        background: rgba(0, 0, 0, 0.4);
        padding: 10px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        gap: 8px;
      }
      .player-stats {
        text-align: center;
        flex: 1;
      }
      .player-stats .name-line {
        font-weight: bold;
        font-size: 13px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .player-stats .weapon-line {
        font-size: 11px;
        color: #ccc;
        margin-top: 2px;
      }
      .health-bar-container {
        background: #555;
        height: 14px;
        border-radius: 7px;
        overflow: hidden;
        margin-top: 5px;
        border: 1px solid #000;
      }
      .health-bar {
        height: 100%;
        width: 100%;
        transition: width 0.1s ease;
      }
      #map-name {
        width: 800px;
        text-align: center;
        font-size: 13px;
        color: #f1c40f;
        margin-bottom: 8px;
        letter-spacing: 1px;
      }
      #canvas-wrap {
        position: relative;
      }
      canvas {
        background: #2f3542;
        border-radius: 6px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        display: block;
      }
      #rol-tag {
        margin-top: 10px;
        font-weight: bold;
        letter-spacing: 1px;
        text-align: center;
      }

      /* ===== PODIO DE FIN DE PARTIDA ===== */
      #podium-overlay {
        display: none;
        position: absolute;
        top: 0;
        left: 0;
        width: 800px;
        height: 500px;
        background: rgba(0, 0, 0, 0.82);
        border-radius: 6px;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 10;
      }
      #podium-title {
        font-size: 30px;
        font-weight: bold;
        color: #f1c40f;
        margin-bottom: 30px;
        text-shadow: 0 2px 6px rgba(0, 0, 0, 0.6);
      }
      #podium-blocks {
        display: flex;
        align-items: flex-end;
        gap: 18px;
      }
      .podium-block {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .podium-avatar {
        width: 46px;
        height: 46px;
        border-radius: 50%;
        border: 3px solid white;
        margin-bottom: 8px;
      }
      .podium-label {
        font-weight: bold;
        margin-bottom: 4px;
        font-size: 14px;
      }
      .podium-score {
        font-size: 12px;
        color: #ddd;
        margin-bottom: 6px;
      }
      .podium-pillar {
        width: 90px;
        border-radius: 4px 4px 0 0;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding-top: 6px;
        font-weight: bold;
        font-size: 22px;
        color: rgba(0, 0, 0, 0.5);
      }
      #podium-restart-msg {
        margin-top: 26px;
        font-size: 13px;
        color: #bbb;
      }
    </style>
  </head>
  <body>
    <div id="hud">
      <div class="player-stats">
        <div id="p1-name" class="name-line" style="color: #ff4757">
          P1 (Rojo): <span id="p1-score">0</span>
        </div>
        <div class="health-bar-container">
          <div id="p1-bar" class="health-bar" style="background:#ff4757;"></div>
        </div>
        <div id="p1-weapon" class="weapon-line">Espada</div>
      </div>
      <div class="player-stats">
        <div id="p2-name" class="name-line" style="color: #2ed573">
          P2 (Verde): <span id="p2-score">0</span>
        </div>
        <div class="health-bar-container">
          <div id="p2-bar" class="health-bar" style="background:#2ed573;"></div>
        </div>
        <div id="p2-weapon" class="weapon-line">Espada</div>
      </div>
      <div class="player-stats">
        <div id="p3-name" class="name-line" style="color: #1e90ff">
          P3 (Azul): <span id="p3-score">0</span>
        </div>
        <div class="health-bar-container">
          <div id="p3-bar" class="health-bar" style="background:#1e90ff;"></div>
        </div>
        <div id="p3-weapon" class="weapon-line">Espada</div>
      </div>
      <div class="player-stats">
        <div id="p4-name" class="name-line" style="color: #9b59b6">
          P4 (Morado): <span id="p4-score">0</span>
        </div>
        <div class="health-bar-container">
          <div id="p4-bar" class="health-bar" style="background:#9b59b6;"></div>
        </div>
        <div id="p4-weapon" class="weapon-line">Espada</div>
      </div>
    </div>

    <div id="map-name">Cargando mapa...</div>

    <div id="canvas-wrap">
      <canvas id="gameCanvas" width="800" height="500"></canvas>

      <div id="podium-overlay">
        <div id="podium-title">🏆 ¡FIN DE LA PARTIDA! 🏆</div>
        <div id="podium-blocks"></div>
        <div id="podium-restart-msg">Nueva partida en unos segundos...</div>
      </div>
    </div>

    <div id="rol-tag">Identificando rol en la arena...</div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io();
      const canvas = document.getElementById('gameCanvas');
      const ctx = canvas.getContext('2d');
      const FLOOR_Y = 400;
      const CANVAS_WIDTH = 800;

      let miId = null;
      let jugadores = {};
      let weaponPickups = {};
      let mapIndex = 0;

      const keys = { left: false, right: false, up: false, attack: false };

      // Debe coincidir visualmente con los mapas definidos en el servidor
      const MAPS = [
        { name: 'Arena Clásica', bg: '#2f3542', floorColor: '#4b5563', platforms: [] },
        {
          name: 'Templo de Piedra',
          bg: '#2b2320',
          floorColor: '#6b4f3a',
          platforms: [
            { x: 140, y: 300, width: 150, height: 16 },
            { x: 510, y: 300, width: 150, height: 16 },
          ],
        },
        {
          name: 'Plataformas Flotantes',
          bg: '#18222e',
          floorColor: '#34495e',
          platforms: [
            { x: 70, y: 320, width: 120, height: 16 },
            { x: 340, y: 250, width: 120, height: 16 },
            { x: 610, y: 320, width: 120, height: 16 },
          ],
        },
        {
          name: 'Volcán',
          bg: '#2e1512',
          floorColor: '#c0392b',
          platforms: [{ x: 250, y: 310, width: 300, height: 16 }],
        },
        {
          name: 'Hielo Eterno',
          bg: '#152530',
          floorColor: '#85c1e9',
          platforms: [
            { x: 90, y: 280, width: 100, height: 16 },
            { x: 610, y: 280, width: 100, height: 16 },
            { x: 350, y: 340, width: 100, height: 16 },
          ],
        },
      ];

      // Debe coincidir con las armas definidas en el servidor
      const WEAPON_VISUALS = {
        espada: { name: 'Espada', length: 32, attackLength: 50, color: '#f1c40f', width: 5 },
        lanza: { name: 'Lanza', length: 46, attackLength: 68, color: '#95a5a6', width: 4 },
        hacha: { name: 'Hacha', length: 26, attackLength: 38, color: '#e74c3c', width: 9 },
        daga: { name: 'Daga', length: 16, attackLength: 26, color: '#ecf0f1', width: 3 },
        martillo: { name: 'Martillo', length: 28, attackLength: 40, color: '#9b59b6', width: 11 },
      };
      const PICKUP_LETTER = { espada: 'E', lanza: 'L', hacha: 'H', daga: 'D', martillo: 'M' };

      socket.on('init', (data) => {
        miId = data.id;
      });

      socket.on('estadoJuego', (estado) => {
        jugadores = estado.players;
        weaponPickups = estado.weaponPickups;
        mapIndex = estado.mapIndex;

        document.getElementById('map-name').innerText =
          '🗺️ Mapa: ' + MAPS[mapIndex].name;

        for (let role = 1; role <= 4; role++) {
          let p = Object.values(jugadores).find((j) => j.role === role);
          let bar = document.getElementById('p' + role + '-bar');
          let score = document.getElementById('p' + role + '-score');
          let weaponLabel = document.getElementById('p' + role + '-weapon');
          if (p) {
            bar.style.width = p.health + '%';
            score.innerText = p.score;
            const wv = WEAPON_VISUALS[p.weapon] || WEAPON_VISUALS.espada;
            weaponLabel.innerText = wv.name;
          } else {
            bar.style.width = '0%';
            weaponLabel.innerText = '';
          }
        }

        const miUsuario = jugadores[miId];
        const rolTag = document.getElementById('rol-tag');
        if (miUsuario) {
          if (miUsuario.role >= 1 && miUsuario.role <= 4) {
            rolTag.innerText =
              'ESTÁS CONTROLANDO AL JUGADOR ' +
              miUsuario.role +
              ' - CONTROLES: WASD o FLECHAS + ESPACIO';
            rolTag.style.color = miUsuario.color;
          } else {
            rolTag.innerText =
              'SALA LLENA (4/4): ESTÁS EN MODO ESPECTADOR (Espera a que uno salga)';
            rolTag.style.color = '#f1c40f';
          }
        }
      });

      // ===== FIN DE PARTIDA: MOSTRAR PODIO =====
      socket.on('finDePartida', (data) => {
        mostrarPodio(data.podium);
      });

      socket.on('nuevaPartida', () => {
        document.getElementById('podium-overlay').style.display = 'none';
      });

      function mostrarPodio(podium) {
        const overlay = document.getElementById('podium-overlay');
        const blocks = document.getElementById('podium-blocks');
        blocks.innerHTML = '';

        // Orden visual: 2do - 1ro - 3ro (como podio real)
        const orden = [1, 0, 2];
        const alturas = [95, 130, 65];
        const medallas = ['🥈', '🥇', '🥉'];

        orden.forEach((idxPodio, posVisual) => {
          const jugador = podium[idxPodio];
          const div = document.createElement('div');
          div.className = 'podium-block';

          if (jugador) {
            div.innerHTML =
              '<div class="podium-label" style="color:' +
              jugador.color +
              '">' +
              medallas[posVisual] +
              ' P' +
              jugador.role +
              '</div>' +
              '<div class="podium-score">' +
              jugador.score +
              ' puntos</div>' +
              '<div class="podium-pillar" style="height:' +
              alturas[posVisual] +
              'px; background:' +
              jugador.color +
              ';">' +
              (idxPodio + 1) +
              '</div>';
          } else {
            div.innerHTML =
              '<div class="podium-label" style="color:#666">--</div>' +
              '<div class="podium-score">&nbsp;</div>' +
              '<div class="podium-pillar" style="height:' +
              alturas[posVisual] +
              'px; background:#444;">' +
              (idxPodio + 1) +
              '</div>';
          }

          blocks.appendChild(div);
        });

        overlay.style.display = 'flex';
      }

      // ===== RENDERIZADO =====
      function draw() {
        const map = MAPS[mapIndex] || MAPS[0];

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Fondo del mapa actual
        ctx.fillStyle = map.bg;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Suelo principal
        ctx.fillStyle = map.floorColor;
        ctx.fillRect(0, FLOOR_Y, canvas.width, 100);
        ctx.fillStyle = 'rgba(0,0,0,0.25)';
        ctx.fillRect(0, FLOOR_Y, canvas.width, 8);

        // Plataformas flotantes del mapa
        for (let plat of map.platforms) {
          ctx.fillStyle = map.floorColor;
          ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
          ctx.fillStyle = 'rgba(0,0,0,0.25)';
          ctx.fillRect(plat.x, plat.y, plat.width, 4);
        }

        // Armas en el suelo esperando ser recogidas
        for (let id in weaponPickups) {
          let pk = weaponPickups[id];
          const visual = WEAPON_VISUALS[pk.type] || WEAPON_VISUALS.espada;
          ctx.beginPath();
          ctx.arc(pk.x, pk.y, 14, 0, Math.PI * 2);
          ctx.fillStyle = visual.color;
          ctx.fill();
          ctx.strokeStyle = '#fff';
          ctx.lineWidth = 2;
          ctx.stroke();
          ctx.font = 'bold 13px sans-serif';
          ctx.fillStyle = '#1e1e24';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(PICKUP_LETTER[pk.type] || '?', pk.x, pk.y + 1);
          ctx.textBaseline = 'alphabetic';
          ctx.textAlign = 'left';
        }

        // Jugadores
        for (let id in jugadores) {
          let p = jugadores[id];
          if (p.role > 4) continue;

          if (p.health <= 0) {
            ctx.font = '14px sans-serif';
            ctx.fillStyle = '#fff';
            ctx.fillText('❌ ELIMINADO', p.x - 40, p.y - 20);
            continue;
          }

          const arma = WEAPON_VISUALS[p.weapon] || WEAPON_VISUALS.espada;

          ctx.strokeStyle = p.color;
          ctx.lineWidth = 4;
          ctx.lineCap = 'round';

          ctx.beginPath();
          ctx.arc(p.x, p.y - 12, 8, 0, Math.PI * 2);
          ctx.fillStyle = p.color;
          ctx.fill();
          ctx.strokeStyle = '#ffffff';
          ctx.lineWidth = 2;
          ctx.stroke();

          ctx.strokeStyle = p.color;
          ctx.lineWidth = 4;

          ctx.beginPath();
          ctx.moveTo(p.x, p.y - 4);
          ctx.lineTo(p.x, p.y + 12);
          ctx.stroke();

          ctx.beginPath();
          ctx.moveTo(p.x, p.y + 12);
          ctx.lineTo(p.x - 6, p.y + 25);
          ctx.moveTo(p.x, p.y + 12);
          ctx.lineTo(p.x + 6, p.y + 25);
          ctx.stroke();

          // --- ARMA EQUIPADA ---
          let largoArma = p.isAttacking ? arma.attackLength : arma.length;
          let anguloArma = p.isAttacking ? 0 : 0.4;

          let manoX = p.x + 4 * p.facing;
          let manoY = p.y + 4;

          let puntaX = manoX + Math.cos(anguloArma) * largoArma * p.facing;
          let puntaY = manoY + Math.sin(anguloArma) * largoArma;

          if (p.isAttacking) {
            ctx.beginPath();
            ctx.arc(manoX, manoY, largoArma + 5, -0.2, 0.2);
            ctx.strokeStyle = 'rgba(255, 242, 0, 0.2)';
            ctx.lineWidth = 8;
            ctx.stroke();
          }

          ctx.beginPath();
          ctx.moveTo(manoX, manoY);
          ctx.lineTo(puntaX, puntaY);
          ctx.strokeStyle = arma.color;
          ctx.lineWidth = arma.width;
          ctx.stroke();

          ctx.beginPath();
          ctx.moveTo(manoX, manoY - 4);
          ctx.lineTo(manoX, manoY + 4);
          ctx.strokeStyle = '#ffffff';
          ctx.lineWidth = 3;
          ctx.stroke();

          // Etiqueta de jugador
          ctx.font = 'bold 11px sans-serif';
          ctx.fillStyle = p.color;
          ctx.textAlign = 'center';
          ctx.fillText('P' + p.role, p.x, p.y - 26);
          ctx.textAlign = 'left';
        }

        requestAnimationFrame(draw);
      }

      draw();

      function enviarInputs() {
        socket.emit('input', keys);
      }

      window.addEventListener('keydown', (e) => {
        let key = e.key.toLowerCase();
        if (key === 'arrowleft' || key === 'a') keys.left = true;
        if (key === 'arrowright' || key === 'd') keys.right = true;
        if (key === 'arrowup' || key === 'w') keys.up = true;
        if (e.key === ' ' || key === 'j') keys.attack = true;
        enviarInputs();
      });

      window.addEventListener('keyup', (e) => {
        let key = e.key.toLowerCase();
        if (key === 'arrowleft' || key === 'a') keys.left = false;
        if (key === 'arrowright' || key === 'd') keys.right = false;
        if (key === 'arrowup' || key === 'w') keys.up = false;
        if (e.key === ' ' || key === 'j') keys.attack = false;
        enviarInputs();
      });
    </script>
  </body>
</html>
