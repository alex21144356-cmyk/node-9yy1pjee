<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Stickman Supreme Duelist Showdown 4P</title>
    <style>
      body {
        margin: 0;
        background: #1e1e24;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        color: white;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        overflow: hidden;
      }
      #hud {
        display: flex;
        justify-content: space-between;
        width: 800px;
        margin-bottom: 10px;
        background: rgba(0, 0, 0, 0.4);
        padding: 10px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        gap: 8px;
      }
      .player-stats {
        text-align: center;
        flex: 1;
      }
      .player-stats .name-line {
        font-weight: bold;
        font-size: 13px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .player-stats .weapon-line {
        font-size: 11px;
        color: #ccc;
        margin-top: 2px;
      }
      .health-bar-container {
        background: #555;
        height: 14px;
        border-radius: 7px;
        overflow: hidden;
        margin-top: 5px;
        border: 1px solid #000;
      }
      .health-bar {
        height: 100%;
        width: 100%;
        transition: width 0.1s ease;
      }
      #map-name {
        width: 800px;
        text-align: center;
        font-size: 13px;
        color: #f1c40f;
        margin-bottom: 8px;
        letter-spacing: 1px;
      }
      #canvas-wrap {
        position: relative;
      }
      canvas {
        background: #2f3542;
        border-radius: 6px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        display: block;
      }
      #rol-tag {
        margin-top: 10px;
        font-weight: bold;
        letter-spacing: 1px;
        text-align: center;
      }

      /* ===== PODIO DE FIN DE PARTIDA ===== */
      #podium-overlay {
        display: none;
        position: absolute;
        top: 0;
        left: 0;
        width: 800px;
        height: 500px;
        background: rgba(0, 0, 0, 0.82);
        border-radius: 6px;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 10;
      }
      #podium-title {
        font-size: 30px;
        font-weight: bold;
        color: #f1c40f;
        margin-bottom: 30px;
        text-shadow: 0 2px 6px rgba(0, 0, 0, 0.6);
      }
      #podium-blocks {
        display: flex;
        align-items: flex-end;
        gap: 18px;
      }
      .podium-block {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .podium-avatar {
        width: 46px;
        height: 46px;
        border-radius: 50%;
        border: 3px solid white;
        margin-bottom: 8px;
      }
      .podium-label {
        font-weight: bold;
        margin-bottom: 4px;
        font-size: 14px;
      }
      .podium-score {
        font-size: 12px;
        color: #ddd;
        margin-bottom: 6px;
      }
      .podium-pillar {
        width: 90px;
        border-radius: 4px 4px 0 0;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding-top: 6px;
        font-weight: bold;
        font-size: 22px;
        color: rgba(0, 0, 0, 0.5);
      }
      #podium-restart-msg {
        margin-top: 26px;
        font-size: 13px;
        color: #bbb;
      }
    </style>
  </head>
  <body>
    <div id="hud">
      <div class="player-stats">
        <div id="p1-name" class="name-line" style="color: #ff4757">
          P1 (Rojo): <span id="p1-score">0</span>
        </div>
        <div class="health-bar-container">
          <div id="p1-bar" class="health-bar" style="background:#ff4757;"></div>
        </div>
        <div id="p1-weapon" class="weapon-line">Cargando...</div>
      </div>
      <div class="player-stats">
        <div id="p2-name" class="name-line" style="color: #2ed573">
          P2 (Verde): <span id="p2-score">0</span>
        </div>
        <div class="health-bar-container">
          <div id="p2-bar" class="health-bar" style="background:#2ed573;"></div>
        </div>
        <div id="p2-weapon" class="weapon-line">Cargando...</div>
      </div>
      <div class="player-stats">
        <div id="p3-name" class="name-line" style="color: #1e90ff">
          P3 (Azul): <span id="p3-score">0</span>
        </div>
        <div class="health-bar-container">
          <div id="p3-bar" class="health-bar" style="background:#1e90ff;"></div>
        </div>
        <div id="p3-weapon" class="weapon-line">Cargando...</div>
      </div>
      <div class="player-stats">
        <div id="p4-name" class="name-line" style="color: #9b59b6">
          P4 (Morado): <span id="p4-score">0</span>
        </div>
        <div class="health-bar-container">
          <div id="p4-bar" class="health-bar" style="background:#9b59b6;"></div>
        </div>
        <div id="p4-weapon" class="weapon-line">Cargando...</div>
      </div>
    </div>

    <div id="map-name">Cargando mapa...</div>

    <div id="canvas-wrap">
      <canvas id="gameCanvas" width="800" height="500"></canvas>

      <div id="podium-overlay">
        <div id="podium-title">🏆 ¡FIN DE LA PARTIDA! 🏆</div>
        <div id="podium-blocks"></div>
        <div id="podium-restart-msg">Nueva partida en unos segundos...</div>
      </div>
    </div>

    <div id="rol-tag">Identificando rol en la arena...</div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
      const socket = io(window.location.origin);
      const canvas = document.getElementById('gameCanvas');
      const ctx = canvas.getContext('2d');
      const FLOOR_Y = 400;
      const CANVAS_WIDTH = 800;

      let miId = null;
      let jugadores = {};
      let weaponPickups = {};
      let projectiles = [];
      let mapIndex = 0;

      const keys = { left: false, right: false, up: false, attack: false };

      const MAPS = [
        { name: 'Arena Clásica', bg: '#2f3542', floorColor: '#4b5563', hasVoid: false, platforms: [] },
        {
          name: 'Templo de Piedra',
          bg: '#2b2320',
          floorColor: '#6b4f3a',
          hasVoid: false,
          platforms: [
            { x: 140, y: 300, width: 150, height: 16 },
            { x: 510, y: 300, width: 150, height: 16 },
          ],
        },
        {
          name: 'Plataformas Flotantes',
          bg: '#18222e',
          floorColor: '#34495e',
          hasVoid: false,
          platforms: [
            { x: 70, y: 320, width: 120, height: 16 },
            { x: 340, y: 250, width: 120, height: 16 },
            { x: 610, y: 320, width: 120, height: 16 },
          ],
        },
        {
          name: 'Volcán',
          bg: '#2e1512',
          floorColor: '#c0392b',
          hasVoid: false,
          platforms: [{ x: 250, y: 310, width: 300, height: 16 }],
        },
        {
          name: 'Hielo Eterno',
          bg: '#152530',
          floorColor: '#85c1e9',
          hasVoid: false,
          platforms: [
            { x: 90, y: 280, width: 100, height: 16 },
            { x: 610, y: 280, width: 100, height: 16 },
            { x: 350, y: 340, width: 100, height: 16 },
          ],
        },
        {
          name: 'Abismo del Vacío (Peligro de Caída)',
          bg: '#0f0f14',
          floorColor: '#1e272e',
          hasVoid: true,
          platforms: [
            { x: 50, y: 350, width: 220, height: 20 },
            { x: 530, y: 350, width: 220, height: 20 },
            { x: 300, y: 230, width: 200, height: 20 },
          ],
        },
        {
          name: 'Estructuras Elevadas (Peligro de Caída)',
          bg: '#2c3e50',
          floorColor: '#7f8c8d',
          hasVoid: true,
          platforms: [
            { x: 150, y: 380, width: 120, height: 20 },
            { x: 530, y: 380, width: 120, height: 20 },
            { x: 300, y: 290, width: 200, height: 20 },
            { x: 100, y: 190, width: 150, height: 20 },
            { x: 550, y: 190, width: 150, height: 20 },
          ],
        },
        {
          name: 'Puentes Suspendidos (Peligro de Caída)',
          bg: '#1e1e24',
          floorColor: '#d35400',
          hasVoid: true,
          platforms: [
            { x: 30, y: 390, width: 160, height: 15 },
            { x: 610, y: 390, width: 160, height: 15 },
            { x: 220, y: 300, width: 360, height: 15 },
            { x: 340, y: 190, width: 120, height: 15 },
          ],
        },
        {
          name: 'Ruinas Metálicas',
          bg: '#1a1d20',
          floorColor: '#57606f',
          hasVoid: false,
          platforms: [
            { x: 200, y: 320, width: 400, height: 16 },
            { x: 300, y: 220, width: 200, height: 16 },
          ],
        },
        {
          name: 'Fábrica Tóxica',
          bg: '#1b2a1a',
          floorColor: '#2ed573',
          hasVoid: false,
          platforms: [
            { x: 50, y: 280, width: 180, height: 16 },
            { x: 570, y: 280, width: 180, height: 16 },
            { x: 270, y: 200, width: 260, height: 16 },
          ],
        },
        {
          name: 'Laboratorio Espacial',
          bg: '#0c1020',
          floorColor: '#45aaf2',
          hasVoid: false,
          platforms: [
            { x: 100, y: 330, width: 600, height: 14 },
            { x: 250, y: 240, width: 300, height: 14 },
          ],
        },
        {
          name: 'Búnker Subterráneo',
          bg: '#2d3436',
          floorColor: '#2d3436',
          hasVoid: false,
          platforms: [
            { x: 80, y: 310, width: 200, height: 20 },
            { x: 520, y: 310, width: 200, height: 20 },
            { x: 180, y: 200, width: 440, height: 20 },
          ],
        },
        {
          name: 'Zona Desértica',
          bg: '#4a3c31',
          floorColor: '#e1b12c',
          hasVoid: false,
          platforms: [
            { x: 50, y: 300, width: 150, height: 16 },
            { x: 600, y: 300, width: 150, height: 16 },
            { x: 240, y: 220, width: 320, height: 16 },
          ],
        },
      ];

      const WEAPON_VISUALS = {
        espada: { name: 'Espada', length: 32, attackLength: 50, color: '#f1c40f', width: 5, icon: '🗡️', type: 'melee_slash' },
        espadon: { name: 'Espadón', length: 48, attackLength: 68, color: '#f39c12', width: 8, icon: '⚔️', type: 'melee_slash' },
        hoja_rapida: { name: 'Hoja Rápida', length: 24, attackLength: 36, color: '#f1c40f', width: 4, icon: '🗡️', type: 'melee_slash' },
        gancho: { name: 'Gancho de Agarre', length: 24, attackLength: 24, color: '#1abc9c', width: 4, icon: '⚓', type: 'grapple' },
        fusil_rapido: { name: 'Fusil Rápido', length: 32, attackLength: 32, color: '#f1c40f', width: 6, icon: '🔫', type: 'ranged' },
        fusil_pesado: { name: 'Fusil Pesado', length: 44, attackLength: 44, color: '#e74c3c', width: 9, icon: '💥', type: 'ranged' },
        fusil_plasma: { name: 'Fusil Plasma', length: 36, attackLength: 36, color: '#9b59b6', width: 7, icon: '🌌', type: 'ranged' },
        lanza: { name: 'Lanza', length: 50, attackLength: 72, color: '#95a5a6', width: 4, icon: '🔱', type: 'melee_thrust' },
        hacha: { name: 'Hacha', length: 28, attackLength: 42, color: '#e74c3c', width: 9, icon: '🪓', type: 'melee_heavy' },
        daga: { name: 'Daga', length: 18, attackLength: 28, color: '#ecf0f1', width: 3, icon: '🔪', type: 'melee_thrust' },
        martillo: { name: 'Martillo', length: 30, attackLength: 44, color: '#9b59b6', width: 11, icon: '🔨', type: 'melee_heavy' },
      };

      const PICKUP_LETTER = {
        espada: 'E', espadon: '⚔️', hoja_rapida: 'R', gancho: '⚓',
        fusil_rapido: 'F', fusil_pesado: 'P', fusil_plasma: 'PL',
        lanza: 'L', hacha: 'H', daga: 'D', martillo: 'M'
      };

      socket.on('init', (data) => {
        miId = data.id;
      });

      socket.on('estadoJuego', (estado) => {
        jugadores = estado.players;
        weaponPickups = estado.weaponPickups;
        projectiles = estado.projectiles || [];
        mapIndex = estado.mapIndex;

        const actualMap = MAPS[mapIndex] || MAPS[0];
        document.getElementById('map-name').innerText =
          '🗺️ Mapa: ' + actualMap.name;

        for (let role = 1; role <= 4; role++) {
          let p = Object.values(jugadores).find((j) => j.role === role);
          let bar = document.getElementById('p' + role + '-bar');
          let score = document.getElementById('p' + role + '-score');
          let weaponLabel = document.getElementById('p' + role + '-weapon');
          if (p) {
            bar.style.width = p.health + '%';
            score.innerText = p.score;
            const wv = WEAPON_VISUALS[p.weapon] || WEAPON_VISUALS.espada;
            weaponLabel.innerText = (wv.icon || '') + ' ' + wv.name;
          } else {
            bar.style.width = '0%';
            weaponLabel.innerText = '';
          }
        }

        const miUsuario = jugadores[miId];
        const rolTag = document.getElementById('rol-tag');
        if (miUsuario) {
          if (miUsuario.role >= 1 && miUsuario.role <= 4) {
            rolTag.innerText =
              'ESTÁS CONTROLANDO AL JUGADOR ' +
              miUsuario.role +
              ' - CONTROLES: WASD o FLECHAS + ESPACIO';
            rolTag.style.color = miUsuario.color;
          } else {
            rolTag.innerText =
              'SALA LLENA (4/4): ESTÁS EN MODO ESPECTADOR (Espera a que uno salga)';
            rolTag.style.color = '#f1c40f';
          }
        }
      });

      socket.on('finDePartida', (data) => {
        mostrarPodio(data.podium);
      });

      socket.on('nuevaPartida', () => {
        document.getElementById('podium-overlay').style.display = 'none';
      });

      function mostrarPodio(podium) {
        const overlay = document.getElementById('podium-overlay');
        const blocks = document.getElementById('podium-blocks');
        blocks.innerHTML = '';

        const orden = [1, 0, 2];
        const alturas = [95, 130, 65];
        const medallas = ['🥈', '🥇', '🥉'];

        orden.forEach((idxPodio, posVisual) => {
          const jugador = podium[idxPodio];
          const div = document.createElement('div');
          div.className = 'podium-block';

          if (jugador) {
            div.innerHTML =
              '<div class="podium-label" style="color:' +
              jugador.color +
              '">' +
              medallas[posVisual] +
              ' P' +
              jugador.role +
              '</div>' +
              '<div class="podium-score">' +
              jugador.score +
              ' puntos</div>' +
              '<div class="podium-pillar" style="height:' +
              alturas[posVisual] +
              'px; background:' +
              jugador.color +
              ';">' +
              (idxPodio + 1) +
              '</div>';
          } else {
            div.innerHTML =
              '<div class="podium-label" style="color:#666">--</div>' +
              '<div class="podium-score">&nbsp;</div>' +
              '<div class="podium-pillar" style="height:' +
              alturas[posVisual] +
              'px; background:#444;">' +
              (idxPodio + 1) +
              '</div>';
          }

          blocks.appendChild(div);
        });

        overlay.style.display = 'flex';
      }

      function draw() {
        const map = MAPS[mapIndex] || MAPS[0];

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = map.bg;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (!map.hasVoid) {
          ctx.fillStyle = map.floorColor;
          ctx.fillRect(0, FLOOR_Y, canvas.width, 100);
          ctx.fillStyle = 'rgba(0,0,0,0.25)';
          ctx.fillRect(0, FLOOR_Y, canvas.width, 8);
        }

        for (let plat of map.platforms) {
          ctx.fillStyle = map.floorColor;
          ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
          ctx.fillStyle = 'rgba(0,0,0,0.25)';
          ctx.fillRect(plat.x, plat.y, plat.width, 4);
        }

        for (let id in weaponPickups) {
          let pk = weaponPickups[id];
          const visual = WEAPON_VISUALS[pk.type] || WEAPON_VISUALS.espada;
          ctx.beginPath();
          ctx.arc(pk.x, pk.y, 14, 0, Math.PI * 2);
          ctx.fillStyle = visual.color;
          ctx.fill();
          ctx.strokeStyle = '#fff';
          ctx.lineWidth = 2;
          ctx.stroke();
          ctx.font = 'bold 12px sans-serif';
          ctx.fillStyle = '#1e1e24';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(PICKUP_LETTER[pk.type] || '?', pk.x, pk.y + 1);
          ctx.textBaseline = 'alphabetic';
          ctx.textAlign = 'left';
        }

        for (let proj of projectiles) {
          if (proj.type === 'bullet') {
            ctx.beginPath();
            ctx.arc(proj.x, proj.y, proj.size, 0, Math.PI * 2);
            ctx.fillStyle = proj.color || '#fff';
            ctx.shadowColor = proj.color || '#fff';
            ctx.shadowBlur = 8;
            ctx.fill();
            ctx.shadowBlur = 0; 
          } 
          else if (proj.type === 'hook') {
            let owner = jugadores[proj.ownerId];
            if (owner) {
              ctx.beginPath();
              ctx.moveTo(owner.x, owner.y + 4);
              ctx.lineTo(proj.x, proj.y);
              ctx.strokeStyle = '#95a5a6';
              ctx.lineWidth = 2;
              ctx.setLineDash([4, 4]); 
              ctx.stroke();
              ctx.setLineDash([]); 
            }
            ctx.beginPath();
            ctx.arc(proj.x, proj.y, 6, 0, Math.PI * 2);
            ctx.fillStyle = '#1abc9c';
            ctx.fill();
          }
        }

        // Jugadores
        for (let id in jugadores) {
          let p = jugadores[id];
          if (p.role > 4) continue;

          // Desaparece por completo al morir
          if (p.health <= 0) {
            continue;
          }

          if (p.hook) {
            ctx.beginPath();
            ctx.moveTo(p.x, p.y + 4);
            ctx.lineTo(p.hook.x, p.hook.y);
            ctx.strokeStyle = '#1abc9c';
            ctx.lineWidth = 2.5;
            ctx.stroke();
            
            ctx.beginPath();
            ctx.arc(p.hook.x, p.hook.y, 5, 0, Math.PI * 2);
            ctx.fillStyle = '#16a085';
            ctx.fill();
          }

          const arma = WEAPON_VISUALS[p.weapon] || WEAPON_VISUALS.espada;

          // Dibujar Stickman
          ctx.strokeStyle = p.color;
          ctx.lineWidth = 4;
          ctx.lineCap = 'round';

          ctx.beginPath();
          ctx.arc(p.x, p.y - 12, 8, 0, Math.PI * 2);
          ctx.fillStyle = p.color;
          ctx.fill();
          ctx.strokeStyle = '#ffffff';
          ctx.lineWidth = 2;
          ctx.stroke();

          ctx.strokeStyle = p.color;
          ctx.lineWidth = 4;

          ctx.beginPath();
          ctx.moveTo(p.x, p.y - 4);
          ctx.lineTo(p.x, p.y + 12);
          ctx.stroke();

          ctx.beginPath();
          ctx.moveTo(p.x, p.y + 12);
          ctx.lineTo(p.x - 6, p.y + 25);
          ctx.moveTo(p.x, p.y + 12);
          ctx.lineTo(p.x + 6, p.y + 25);
          ctx.stroke();

          // --- ANIMACIONES PERSONALIZADAS SEGÚN TIPO DE ARMA ---
          let manoX = p.x + 4 * p.facing;
          let manoY = p.y + 4;
          
          let largoArma = arma.length;
          let anguloArma = 0.4; // Ángulo por defecto (inclinado hacia abajo)

          if (p.isAttacking) {
            if (arma.type === 'melee_slash') {
              largoArma = arma.attackLength;
              anguloArma = -0.3; // Sube al golpear

              ctx.beginPath();
              ctx.arc(manoX, manoY, largoArma + 5, -0.4, 0.4);
              ctx.strokeStyle = 'rgba(255, 242, 0, 0.15)';
              ctx.lineWidth = 8;
              ctx.stroke();
            } 
            else if (arma.type === 'melee_thrust') {
              largoArma = arma.attackLength;
              anguloArma = 0; // Estocada recta hacia adelante

              ctx.beginPath();
              ctx.moveTo(manoX, manoY);
              ctx.lineTo(manoX + 10 * p.facing, manoY);
              ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
              ctx.lineWidth = 2;
              ctx.stroke();
            } 
            else if (arma.type === 'melee_heavy') {
              largoArma = arma.attackLength;
              anguloArma = 1.1; // Golpe descendente directo al suelo

              ctx.beginPath();
              ctx.arc(manoX, manoY, largoArma, 0.2, 1.2);
              ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
              ctx.lineWidth = 6;
              ctx.stroke();
            }
          }

          let destelloDisparo = false;
          if (arma.type === 'ranged' && p.inputs.attack && p.shootCooldown > 0) {
            destelloDisparo = true;
          }

          let puntaX = manoX + Math.cos(anguloArma) * largoArma * p.facing;
          let puntaY = manoY + Math.sin(anguloArma) * largoArma;

          // ==========================================
          //   DIBUJO DE ARMAS TOTALMENTE PERSONALIZADAS
          // ==========================================
          ctx.save();
          ctx.translate(manoX, manoY);
          // Si el jugador mira a la izquierda (-1), invertimos el escalado horizontal de la rotación
          ctx.scale(p.facing, 1);
          ctx.rotate(anguloArma);

          if (p.weapon === 'espada') {
            // Mango marrón
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(8, 0);
            ctx.strokeStyle = '#8e44ad'; // Empuñadura morada
            ctx.lineWidth = 4;
            ctx.stroke();

            // Guarda amarilla brillante
            ctx.beginPath();
            ctx.moveTo(8, -6);
            ctx.lineTo(8, 6);
            ctx.strokeStyle = '#f1c40f';
            ctx.lineWidth = 3;
            ctx.stroke();

            // Hoja plateada y afilada
            ctx.beginPath();
            ctx.moveTo(8, -2.5);
            ctx.lineTo(largoArma - 4, -2.5);
            ctx.lineTo(largoArma, 0); // Punta afilada central
            ctx.lineTo(largoArma - 4, 2.5);
            ctx.lineTo(8, 2.5);
            ctx.closePath();
            ctx.fillStyle = '#ecf0f1';
            ctx.fill();
            ctx.strokeStyle = '#bdc3c7';
            ctx.lineWidth = 1;
            ctx.stroke();
          } 
          else if (p.weapon === 'espadon') {
            // Mango largo de mandoble
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(12, 0);
            ctx.strokeStyle = '#2c3e50';
            ctx.lineWidth = 5;
            ctx.stroke();

            // Guarda masiva en V
            ctx.beginPath();
            ctx.moveTo(12, -10);
            ctx.lineTo(10, 0);
            ctx.lineTo(12, 10);
            ctx.strokeStyle = '#d35400';
            ctx.lineWidth = 4;
            ctx.stroke();

            // Hoja ancha plateada
            ctx.beginPath();
            ctx.moveTo(12, -5);
            ctx.lineTo(largoArma - 6, -5);
            ctx.lineTo(largoArma, 0);
            ctx.lineTo(largoArma - 6, 5);
            ctx.lineTo(12, 5);
            ctx.closePath();
            ctx.fillStyle = '#bdc3c7';
            ctx.fill();
            
            // Línea de brillo en medio del espadón
            ctx.beginPath();
            ctx.moveTo(12, 0);
            ctx.lineTo(largoArma - 4, 0);
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 1.5;
            ctx.stroke();
          } 
          else if (p.weapon === 'hoja_rapida') {
            // Agarre y cazoleta circular de florete
            ctx.beginPath();
            ctx.arc(6, 0, 5, -Math.PI/2, Math.PI/2);
            ctx.strokeStyle = '#f1c40f';
            ctx.lineWidth = 3;
            ctx.stroke();

            // Hoja ultra-fina (Estilete)
            ctx.beginPath();
            ctx.moveTo(6, 0);
            ctx.lineTo(largoArma, 0);
            ctx.strokeStyle = '#ecf0f1';
            ctx.lineWidth = 2.5;
            ctx.stroke();
          } 
          else if (p.weapon === 'daga') {
            // Mango simple
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(5, 0);
            ctx.strokeStyle = '#7f8c8d';
            ctx.lineWidth = 3;
            ctx.stroke();

            // Hoja pequeña muy filosa
            ctx.beginPath();
            ctx.moveTo(5, -2);
            ctx.lineTo(largoArma - 3, -2);
            ctx.lineTo(largoArma, 0);
            ctx.lineTo(largoArma - 3, 2);
            ctx.lineTo(5, 2);
            ctx.closePath();
            ctx.fillStyle = '#eaf0f1';
            ctx.fill();
          } 
          else if (p.weapon === 'lanza') {
            // Asta de madera larga
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(largoArma - 12, 0);
            ctx.strokeStyle = '#a0522d';
            ctx.lineWidth = 3.5;
            ctx.stroke();

            // Punta de lanza en forma de rombo metálico
            ctx.beginPath();
            ctx.moveTo(largoArma - 12, -4);
            ctx.lineTo(largoArma, 0);
            ctx.lineTo(largoArma - 12, 4);
            ctx.lineTo(largoArma - 15, 0);
            ctx.closePath();
            ctx.fillStyle = '#bdc3c7';
            ctx.fill();
            ctx.strokeStyle = '#7f8c8d';
            ctx.lineWidth = 1;
            ctx.stroke();
          } 
          else if (p.weapon === 'hacha') {
            // Mango de madera
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(largoArma, 0);
            ctx.strokeStyle = '#8b5a2b';
            ctx.lineWidth = 4;
            ctx.stroke();

            // Cuchilla doble de hacha de batalla
            ctx.beginPath();
            ctx.moveTo(largoArma - 10, 0);
            // Filo superior curvado
            ctx.quadraticCurveTo(largoArma - 12, -14, largoArma, -16);
            ctx.quadraticCurveTo(largoArma + 3, -8, largoArma - 2, 0);
            // Filo inferior curvado
            ctx.quadraticCurveTo(largoArma + 3, 8, largoArma, 16);
            ctx.quadraticCurveTo(largoArma - 12, 14, largoArma - 10, 0);
            ctx.closePath();
            ctx.fillStyle = '#95a5a6';
            ctx.fill();
            ctx.strokeStyle = '#ecf0f1';
            ctx.lineWidth = 1.5;
            ctx.stroke();
          } 
          else if (p.weapon === 'martillo') {
            // Mango de acero
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(largoArma, 0);
            ctx.strokeStyle = '#7f8c8d';
            ctx.lineWidth = 5;
            ctx.stroke();

            // Cabeza del martillo colosal
            ctx.fillStyle = '#4c566a';
            // Dibujamos un martillo rectangular masivo en el extremo
            ctx.fillRect(largoArma - 12, -14, 16, 28);
            
            // Bordes metálicos reforzados
            ctx.strokeStyle = '#d8dee9';
            ctx.lineWidth = 2;
            ctx.strokeRect(largoArma - 12, -14, 16, 28);
          } 
          else if (p.weapon === 'gancho') {
            // Cable del gancho
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(largoArma - 6, 0);
            ctx.strokeStyle = '#7f8c8d';
            ctx.lineWidth = 3;
            ctx.stroke();

            // Garra de anclaje (Punta de arpón de tres puntas)
            ctx.beginPath();
            ctx.moveTo(largoArma - 6, 0);
            ctx.lineTo(largoArma, 0);
            ctx.moveTo(largoArma - 6, -6);
            ctx.quadraticCurveTo(largoArma - 3, -6, largoArma, -1);
            ctx.moveTo(largoArma - 6, 6);
            ctx.quadraticCurveTo(largoArma - 3, 6, largoArma, 1);
            ctx.strokeStyle = '#1abc9c';
            ctx.lineWidth = 3;
            ctx.stroke();
          } 
          else if (p.weapon === 'fusil_rapido') {
            // Culata y agarre
            ctx.fillStyle = '#2c3e50';
            ctx.fillRect(-4, -2, 6, 5); // Culata trasera
            ctx.fillRect(4, 0, 3, 6);   // Empuñadura

            // Cuerpo del rifle
            ctx.fillStyle = '#f1c40f';
            ctx.fillRect(0, -3, largoArma - 10, 5);

            // Cargador de munición curvo
            ctx.beginPath();
            ctx.arc(6, 6, 8, -Math.PI/4, Math.PI/10);
            ctx.strokeStyle = '#34495e';
            ctx.lineWidth = 3;
            ctx.stroke();

            // Cañón y mira superior
            ctx.fillStyle = '#7f8c8d';
            ctx.fillRect(largoArma - 10, -1.5, 10, 2); // Cañón delgado
            ctx.fillRect(largoArma - 12, -4, 2, 2);   // Mira
          } 
          else if (p.weapon === 'fusil_pesado') {
            // Sniper / Cañón pesado
            // Culata reforzada grande
            ctx.fillStyle = '#34495e';
            ctx.fillRect(-6, -4, 8, 7); 
            ctx.fillRect(5, 0, 4, 8); 

            // Cuerpo metálico largo
            ctx.fillStyle = '#c0392b';
            ctx.fillRect(0, -4, largoArma - 16, 7);

            // Mira telescópica (Mira sniper)
            ctx.fillStyle = '#2c3e50';
            ctx.fillRect(6, -7, 10, 3);
            ctx.beginPath();
            ctx.arc(6, -5.5, 2.5, 0, Math.PI*2);
            ctx.arc(16, -5.5, 2.5, 0, Math.PI*2);
            ctx.fill();

            // Cañón grueso extendido
            ctx.fillStyle = '#2c3e50';
            ctx.fillRect(largoArma - 16, -2, 16, 4);
          } 
          else if (p.weapon === 'fusil_plasma') {
            // Fusil de plasma futurista de ciencia ficción
            ctx.fillStyle = '#3f3151';
            ctx.fillRect(-4, -4, 6, 8); // Culata sci-fi
            ctx.fillRect(4, 1, 3, 6);   // Empuñadura

            // Cuerpo ovalado de la pistola de plasma
            ctx.fillStyle = '#8e44ad';
            ctx.beginPath();
            ctx.roundRect(0, -5, largoArma - 8, 9, 3);
            ctx.fill();

            // Núcleo de energía cargada (Glow)
            ctx.fillStyle = '#00ffff';
            ctx.shadowColor = '#00ffff';
            ctx.shadowBlur = 6;
            ctx.fillRect(6, -2.5, 12, 4);
            ctx.shadowBlur = 0; // Restaurar

            // Cañón del proyector de energía dual
            ctx.fillStyle = '#dcdde1';
            ctx.fillRect(largoArma - 8, -4, 8, 2.5);
            ctx.fillRect(largoArma - 8, 0.5, 8, 2.5);
          }

          // Renderizar el destello de disparo justo en la punta (en coordenadas locales)
          if (destelloDisparo) {
            ctx.beginPath();
            ctx.arc(largoArma + 4, 0, 10, 0, Math.PI * 2);
            ctx.fillStyle = '#fff200';
            ctx.shadowColor = '#fff200';
            ctx.shadowBlur = 10;
            ctx.fill();
            ctx.shadowBlur = 0;
          }

          ctx.restore();

          // Identificador encima de la cabeza
          ctx.font = 'bold 11px sans-serif';
          ctx.fillStyle = p.color;
          ctx.textAlign = 'center';
          ctx.fillText('P' + p.role, p.x, p.y - 26);
          ctx.textAlign = 'left';
        }

        requestAnimationFrame(draw);
      }

      draw();

      function enviarInputs() {
        socket.emit('input', keys);
      }

      window.addEventListener('keydown', (e) => {
        let key = e.key.toLowerCase();
        if (key === 'arrowleft' || key === 'a') keys.left = true;
        if (key === 'arrowright' || key === 'd') keys.right = true;
        if (key === 'arrowup' || key === 'w') keys.up = true;
        if (e.key === ' ' || key === 'j') keys.attack = true;
        enviarInputs();
      });

      window.addEventListener('keyup', (e) => {
        let key = e.key.toLowerCase();
        if (key === 'arrowleft' || key === 'a') keys.left = false;
        if (key === 'arrowright' || key === 'd') keys.right = false;
        if (key === 'arrowup' || key === 'w') keys.up = false;
        if (e.key === ' ' || key === 'j') keys.attack = false;
        enviarInputs();
      });
    </script>
  </body>
</html>
