<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Stickman Supreme Duelist Showdown 4P</title>
    <style>
      body {
        margin: 0;
        background: #1e1e24;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        color: white;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        overflow: hidden;
      }
      #hud {
        display: flex;
        justify-content: space-between;
        width: 800px;
        margin-bottom: 10px;
        background: rgba(0, 0, 0, 0.4);
        padding: 10px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        gap: 8px;
      }
      .player-stats {
        text-align: center;
        flex: 1;
      }
      .player-stats .name-line {
        font-weight: bold;
        font-size: 13px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .player-stats .weapon-line {
        font-size: 11px;
        color: #ccc;
        margin-top: 2px;
      }
      .health-bar-container {
        background: #555;
        height: 14px;
        border-radius: 7px;
        overflow: hidden;
        margin-top: 5px;
        border: 1px solid #000;
      }
      .health-bar {
        height: 100%;
        width: 100%;
        transition: width 0.1s ease;
      }
      #map-name {
        width: 800px;
        text-align: center;
        font-size: 13px;
        color: #f1c40f;
        margin-bottom: 8px;
        letter-spacing: 1px;
      }
      #canvas-wrap {
        position: relative;
      }
      canvas {
        background: #2f3542;
        border-radius: 6px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        display: block;
      }
      #rol-tag {
        margin-top: 10px;
        font-weight: bold;
        letter-spacing: 1px;
        text-align: center;
      }

      /* ===== PODIO DE FIN DE PARTIDA ===== */
      #podium-overlay {
        display: none;
        position: absolute;
        top: 0;
        left: 0;
        width: 800px;
        height: 500px;
        background: rgba(0, 0, 0, 0.82);
        border-radius: 6px;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 10;
      }
      #podium-title {
        font-size: 30px;
        font-weight: bold;
        color: #f1c40f;
        margin-bottom: 30px;
        text-shadow: 0 2px 6px rgba(0, 0, 0, 0.6);
      }
      #podium-blocks {
        display: flex;
        align-items: flex-end;
        gap: 18px;
      }
      .podium-block {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .podium-avatar {
        width: 46px;
        height: 46px;
        border-radius: 50%;
        border: 3px solid white;
        margin-bottom: 8px;
      }
      .podium-label {
        font-weight: bold;
        margin-bottom: 4px;
        font-size: 14px;
      }
      .podium-score {
        font-size: 12px;
        color: #ddd;
        margin-bottom: 6px;
      }
      .podium-pillar {
        width: 90px;
        border-radius: 4px 4px 0 0;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding-top: 6px;
        font-weight: bold;
        font-size: 22px;
        color: rgba(0, 0, 0, 0.5);
      }
      #podium-restart-msg {
        margin-top: 26px;
        font-size: 13px;
        color: #bbb;
      }
    </style>
  </head>
