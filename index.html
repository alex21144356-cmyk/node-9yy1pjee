<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stickman Fight</title>
    <style>
        body {
            margin: 0;
            background: #121214;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #ui {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
        }
        .player-card {
            background: #1f1f23;
            padding: 8px 16px;
            border-radius: 6px;
            border-bottom: 4px solid #333;
            min-width: 100px;
            text-align: center;
        }
        canvas {
            border: 4px solid #2d2d30;
            border-radius: 8px;
            background: #1a1a1c;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="ui">
        <div class="player-card" id="p1-card" style="border-color: #ff4757;">P1: 0</div>
        <div class="player-card" id="p2-card" style="border-color: #2ed573;">P2: 0</div>
        <div class="player-card" id="p3-card" style="border-color: #1e90ff;">P3: 0</div>
        <div class="player-card" id="p4-card" style="border-color: #9b59b6;">P4: 0</div>
    </div>

    <canvas id="gameCanvas" width="800" height="500"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let myId = null;
        let gameState = { players: {}, weaponPickups: {}, mapIndex: 0, matchActive: true };

        // Definición de mapas del cliente (deben coincidir con el servidor)
        const MAPS = [
            { name: 'Arena Clásica', color: '#1e272e', floorColor: '#34e7f4', platforms: [] },
            { name: 'Templo de Piedra', color: '#2f3542', floorColor: '#747d8c', platforms: [{ x: 140, y: 300, width: 150, height: 16 }, { x: 510, y: 300, width: 150, height: 16 }] },
            { name: 'Plataformas Flotantes', color: '#1e272e', floorColor: '#2ed573', platforms: [{ x: 70, y: 320, width: 120, height: 16 }, { x: 340, y: 250, width: 120, height: 16 }, { x: 610, y: 320, width: 120, height: 16 }] },
            { name: 'Volcán', color: '#1e1b18', floorColor: '#ff4757', platforms: [{ x: 250, y: 310, width: 300, height: 16 }] },
            { name: 'Hielo Eterno', color: '#0f172a', floorColor: '#7dd3fc', platforms: [{ x: 90, y: 280, width: 100, height: 16 }, { x: 610, y: 280, width: 100, height: 16 }, { x: 350, y: 340, width: 100, height: 16 }] },
            { name: 'Abismo del Vacío (Peligro de Caída)', color: '#09090b', floorColor: '#a1a1aa', platforms: [{ x: 50, y: 350, width: 220, height: 20 }, { x: 530, y: 350, width: 220, height: 20 }, { x: 300, y: 230, width: 200, height: 20 }] },
            { name: 'Estructuras Elevadas (Peligro de Caída)', color: '#111827', floorColor: '#f59e0b', platforms: [{ x: 150, y: 380, width: 120, height: 20 }, { x: 530, y: 380, width: 120, height: 20 }, { x: 300, y: 290, width: 200, height: 20 }, { x: 100, y: 190, width: 150, height: 20 }, { x: 550, y: 190, width: 150, height: 20 }] },
            { name: 'Puentes Suspendidos (Peligro de Caída)', color: '#022c22', floorColor: '#10b981', platforms: [{ x: 30, y: 390, width: 160, height: 15 }, { x: 610, y: 390, width: 160, height: 15 }, { x: 220, y: 300, width: 360, height: 15 }, { x: 340, y: 190, width: 120, height: 15 }] },
            { name: 'Ruinas Metálicas', color: '#1c1917', floorColor: '#a8a29e', platforms: [{ x: 200, y: 320, width: 400, height: 16 }, { x: 300, y: 220, width: 200, height: 16 }] },
            { name: 'Fábrica Tóxica', color: '#14532d', floorColor: '#22c55e', platforms: [{ x: 50, y: 280, width: 180, height: 16 }, { x: 570, y: 280, width: 180, height: 16 }, { x: 270, y: 200, width: 260, height: 16 }] },
            { name: 'Laboratorio Espacial', color: '#172554', floorColor: '#3b82f6', platforms: [{ x: 100, y: 330, width: 600, height: 14 }, { x: 250, y: 240, width: 300, height: 14 }] },
            { name: 'Búnker Subterráneo', color: '#1e1b4b', floorColor: '#6366f1', platforms: [{ x: 80, y: 310, width: 200, height: 20 }, { x: 520, y: 310, width: 200, height: 20 }, { x: 180, y: 200, width: 440, height: 20 }] },
            { name: 'Zona Desértica', color: '#451a03', floorColor: '#f97316', platforms: [{ x: 50, y: 300, width: 150, height: 16 }, { x: 600, y: 300, width: 150, height: 16 }, { x: 240, y: 220, width: 320, height: 16 }] }
        ];

        // ============== ENTRADA DE USUARIO ==============
        const keys = { left: false, right: false, up: false, attack: false };

        window.addEventListener('keydown', (e) => {
            if (e.code === 'KeyA' || e.code === 'ArrowLeft') keys.left = true;
            if (e.code === 'KeyD' || e.code === 'ArrowRight') keys.right = true;
            if (e.code === 'KeyW' || e.code === 'ArrowUp') keys.up = true;
            if (e.code === 'Space') keys.attack = true;
            socket.emit('input', keys);
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'KeyA' || e.code === 'ArrowLeft') keys.left = false;
            if (e.code === 'KeyD' || e.code === 'ArrowRight') keys.right = false;
            if (e.code === 'KeyW' || e.code === 'ArrowUp') keys.up = false;
            if (e.code === 'Space') keys.attack = false;
            socket.emit('input', keys);
        });

        socket.on('init', (data) => { myId = data.id; });
        socket.on('estadoJuego', (state) => { gameState = state; actualizarInterfaz(); });
        socket.on('nuevaPartida', () => { console.log('Nueva ronda iniciada!'); });

        function actualizarInterfaz() {
            const playersArr = Object.values(gameState.players);
            for (let i = 1; i <= 4; i++) {
                const card = document.getElementById(`p${i}-card`);
                const p = playersArr.find(pl => pl.role === i);
                if (p) {
                    card.innerText = `P${i}: ${p.score} pts (${p.weapon.toUpperCase()})`;
                    card.style.opacity = p.health <= 0 ? '0.4' : '1';
                } else {
                    card.innerText = `P${i}: Libre`;
                    card.style.opacity = '0.3';
                }
            }
        }

        // ==========================================================
        // DIBUJO DETALLADO DE LAS ARMAS (EL CORAZÓN DE LA CORRECCIÓN)
        // ==========================================================
        function dibujarArma(ctx, tipo, atacando, ataqueTimer) {
            ctx.save();
            
            // Si está atacando, rotar ligeramente hacia el objetivo para simular impacto
            if (atacando) {
                ctx.rotate(0.3);
            }

            switch(tipo.toLowerCase()) {
                case 'espada':
                    // Mango / Guarda (Dorado)
                    ctx.fillStyle = '#f1c40f';
                    ctx.fillRect(0, -2, 4, 4);
                    ctx.fillRect(3, -5, 2, 10);
                    // Hoja (Plata/Brillante)
                    ctx.fillStyle = '#ecf0f1';
                    ctx.fillRect(5, -2, 28, 4);
                    ctx.fillStyle = '#bdc3c7';
                    ctx.fillRect(33, -1, 3, 2); // Punta
                    break;

                case 'lanza':
                    // Mango de madera largo
                    ctx.fillStyle = '#a0522d';
                    ctx.fillRect(-10, -1, 45, 2);
                    // Punta de metal
                    ctx.fillStyle = '#bdc3c7';
                    ctx.beginPath();
                    ctx.moveTo(35, -3);
                    ctx.lineTo(47, 0);
                    ctx.lineTo(35, 3);
                    ctx.fill();
                    break;

                case 'hacha':
                    // Mango de madera
                    ctx.fillStyle = '#8b4513';
                    ctx.fillRect(0, -1.5, 18, 3);
                    // Hoja de doble filo (Metal)
                    ctx.fillStyle = '#7f8c8d';
                    ctx.beginPath();
                    ctx.moveTo(14, -8);
                    ctx.lineTo(22, -12);
                    ctx.lineTo(19, 0);
                    ctx.lineTo(22, 12);
                    ctx.lineTo(14, 8);
                    ctx.fill();
                    // Filo brillante
                    ctx.fillStyle = '#d1d8e0';
                    ctx.fillRect(15, -3, 3, 6);
                    break;

                case 'daga':
                    // Mango negro
                    ctx.fillStyle = '#2c3e50';
                    ctx.fillRect(0, -1.5, 3, 3);
                    // Hoja afilada corta
                    ctx.fillStyle = '#95a5a6';
                    ctx.fillRect(3, -1, 12, 2);
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(15, -0.5, 2, 1);
                    break;

                case 'martillo':
                    // Mango grueso
                    ctx.fillStyle = '#d2b48c';
                    ctx.fillRect(-5, -2, 20, 4);
                    // Bloque pesado de acero
                    ctx.fillStyle = '#34495e';
                    ctx.fillRect(12, -10, 12, 20);
                    ctx.fillStyle = '#57606f';
                    ctx.fillRect(14, -8, 8, 16); // Relieve de la cabeza
                    break;

                case 'fusil':
                    // Culata (Madera)
                    ctx.fillStyle = '#5c4033';
                    ctx.fillRect(-12, -2, 10, 6);
                    ctx.fillRect(-15, 1, 5, 4);
                    // Cuerpo de metal
                    ctx.fillStyle = '#2d2d2d';
                    ctx.fillRect(-2, -3, 18, 6);
                    ctx.fillStyle = '#1e1e24';
                    ctx.fillRect(2, 3, 3, 6); // Mango
                    // Cargador curvo
                    ctx.fillStyle = '#111111';
                    ctx.fillRect(8, 3, 4, 8);
                    // Cañón largo
                    ctx.fillStyle = '#718093';
                    ctx.fillRect(16, -1, 24, 2);
                    ctx.fillStyle = '#2d2d2d';
                    ctx.fillRect(36, -2, 2, 4); // Mira telescópica delantera
                    break;

                default:
                    // Respaldo simple por si acaso
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, -2, 20, 4);
            }
            ctx.restore();
        }

        // ============== LOOP DE RENDERIZADO DEL CLIENTE ==============
        function draw() {
            const currentMap = MAPS[gameState.mapIndex] || MAPS[0];
            
            // Dibujar fondo del mapa
            ctx.fillStyle = currentMap.color;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Dibujar suelo principal si no tiene vacío
            if (!currentMap.hasVoid) {
                ctx.fillStyle = currentMap.floorColor;
                ctx.fillRect(0, 400, canvas.width, 100);
            }

            // Dibujar plataformas del mapa
            if (currentMap.platforms) {
                ctx.fillStyle = currentMap.floorColor;
                currentMap.platforms.forEach(plat => {
                    ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
                });
            }

            // Dibujar Armas tiradas en el suelo (Pickups)
            for (let id in gameState.weaponPickups) {
                let pk = gameState.weaponPickups[id];
                ctx.save();
                ctx.translate(pk.x, pk.y);
                // Dibujar un halo brillante alrededor del arma tirada
                ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
                ctx.beginPath();
                ctx.arc(0, 0, 15, 0, Math.PI * 2);
                ctx.fill();
                
                // Dibujar el diseño miniatura del arma en el suelo
                dibujarArma(ctx, pk.type, false, 0);
                ctx.restore();
            }

            // Dibujar Jugadores (Stickmans)
            for (let id in gameState.players) {
                let p = gameState.players[id];
                if (p.health <= 0) continue; // No dibujar si están muertos

                ctx.save();
                ctx.translate(p.x, p.y);

                // Voltear horizontalmente según la dirección en la que mira
                if (p.facing === -1) {
                    ctx.scale(-1, 1);
                }

                // --- DIBUJO DEL STICKMAN ---
                ctx.strokeStyle = p.color;
                ctx.lineWidth = 3.5;
                ctx.lineCap = 'round';

                // Cabeza
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(0, -25, 8, 0, Math.PI * 2);
                ctx.fill();

                // Torso / Cuerpo
                ctx.beginPath();
                ctx.moveTo(0, -17);
                ctx.lineTo(0, 5);
                ctx.stroke();

                // Piernas (Animación básica de correr/parado)
                ctx.beginPath();
                if (p.vx !== 0) {
                    // Animación básica de piernas al correr
                    let t = Date.now() * 0.012;
                    ctx.moveTo(0, 5);
                    ctx.lineTo(Math.sin(t) * 10, 20);
                    ctx.moveTo(0, 5);
                    ctx.lineTo(-Math.sin(t) * 10, 20);
                } else {
                    ctx.moveTo(0, 5);
                    ctx.lineTo(-6, 20);
                    ctx.moveTo(0, 5);
                    ctx.lineTo(6, 20);
                }
                ctx.stroke();

                // Brazo trasero
                ctx.beginPath();
                ctx.moveTo(0, -10);
                ctx.lineTo(-5, -2);
                ctx.stroke();

                // --- ARMA EN MANO ---
                // Se renderiza entre los dos brazos para dar efecto de profundidad
                ctx.save();
                ctx.translate(5, -5); // Llevar el origen al puño del jugador
                dibujarArma(ctx, p.weapon, p.isAttacking, p.attackTimer);
                ctx.restore();

                // Brazo delantero sosteniendo el arma
                ctx.beginPath();
                ctx.moveTo(0, -10);
                ctx.lineTo(8, -5);
                ctx.stroke();

                ctx.restore();

                // --- BARRA DE VIDA Y NOMBRE ARRIBA DEL JUGADOR ---
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(p.x - 20, p.y - 43, 40, 6);
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x - 20, p.y - 43, (p.health / 100) * 40, 6);

                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 11px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(`P${p.role}`, p.x, p.y - 48);
            }

            requestAnimationFrame(draw);
        }

        requestAnimationFrame(draw);
    </script>
</body>
</html>
